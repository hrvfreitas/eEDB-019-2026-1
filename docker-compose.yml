version: "3.9"

services:

  # ============================================================
  # POSTGRES (RAW / SILVER / GOLD)
  # ============================================================
  postgres:
    image: postgres:15
    container_name: projeto_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projeto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db:/docker-entrypoint-initdb.d

  # ============================================================
  # AIRBYTE (SERVER + WORKER)
  # ============================================================
  airbyte-server:
    image: airbyte/server:latest
    container_name: projeto_airbyte_server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AIRBYTE_ROLE=server
    depends_on:
      - postgres
    volumes:
      - airbyte_data:/data

  airbyte-worker:
    image: airbyte/worker:latest
    container_name: projeto_airbyte_worker
    restart: unless-stopped
    environment:
      - AIRBYTE_ROLE=worker
    depends_on:
      - airbyte-server
    volumes:
      - airbyte_data:/data

  # ============================================================
  # AIRFLOW (WEB + SCHEDULER + TRIGGERER + INIT)
  # ============================================================
  airflow-init:
    image: apache/airflow:2.8.1
    container_name: projeto_airflow_init
    entrypoint: >
      bash -c "
      airflow db init &&
      airflow users create \
        --username admin \
        --password admin \
        --firstname admin \
        --lastname admin \
        --role Admin \
        --email admin@email.com
      "
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/projeto
    depends_on:
      - postgres
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: projeto_airflow_webserver
    restart: unless-stopped
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/projeto
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8080:8080"
    command: airflow webserver
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: projeto_airflow_scheduler
    restart: unless-stopped
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/projeto
    command: airflow scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  airflow-triggerer:
    image: apache/airflow:2.8.1
    container_name: projeto_airflow_triggerer
    restart: unless-stopped
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/projeto
    command: airflow triggerer
    volumes:
      - ./airflow/dags:/opt/airflow/dags

  # ============================================================
  # DBT (EXECUÇÃO)
  # ============================================================
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: projeto_dbt
    depends_on:
      - postgres
    working_dir: /usr/app
    volumes:
      - ./dbt:/usr/app
      - ./dbt/profiles:/root/.dbt

  # ============================================================
  # METABASE (DASHBOARD)
  # ============================================================
  metabase:
    image: metabase/metabase:latest
    container_name: projeto_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  airbyte_data:
  metabase_data:
